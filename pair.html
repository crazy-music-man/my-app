<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>消えていく会話 — 二画面版</title>
<style>
  :root {
    --bg: #f4f1ec;
    --ink: #2b2724;
    --muted: #9a938a;
    --mine: #3a3530;
    --mine-text: #f7f4ef;
    --ghost-line: #cfc7ba;
    --bar: #ffffff;
    --accent: #b08968;
    --shadow: rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ---- lobby ---- */
  #lobby {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 18px; padding: 28px; text-align: center;
  }
  #lobby h1 { font-size: 20px; margin: 0; font-weight: 700; }
  #lobby p { color: var(--muted); font-size: 13.5px; line-height: 1.8; margin: 0; max-width: 320px; }
  .room { display: flex; gap: 8px; align-items: center; }
  .room input {
    border: 1px solid #e3dccf; border-radius: 12px; padding: 10px 14px;
    font-size: 16px; background: #fbf9f5; width: 160px; text-align: center;
  }
  .roles { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
  .roles button {
    border: 1px solid #e3dccf; background: #fff; border-radius: 14px;
    padding: 14px; font-size: 15px; font-weight: 600; color: var(--ink);
  }
  .roles button small { display: block; font-weight: 400; color: var(--muted); font-size: 12px; margin-top: 3px; }
  .roles button:active { background: #fffaf3; border-color: var(--accent); }

  /* ---- header ---- */
  header {
    flex: 0 0 auto; background: var(--bar); border-bottom: 1px solid #ece6dc;
    padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .turn { font-size: 14px; font-weight: 600; flex: 1; line-height: 1.3; }
  .turn small { display:block; font-weight:400; color: var(--muted); font-size: 11px; margin-top: 2px; }
  .reset { border:0; background:transparent; color:var(--muted); font-size:18px; padding:4px; }

  /* ---- thread ---- */
  .thread {
    flex: 1 1 auto; overflow-y: auto; padding: 16px 14px 8px;
    display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch;
  }
  .row { display: flex; }
  .row.right { justify-content: flex-end; }
  .row.left  { justify-content: flex-start; }
  .bubble {
    max-width: 78%; padding: 10px 13px; border-radius: 18px;
    font-size: 15.5px; line-height: 1.45; word-break: break-word;
    position: relative; animation: pop .18s ease;
  }
  @keyframes pop { from { transform: scale(.96); opacity:.4 } to { transform: scale(1); opacity:1 } }
  .bubble.mine  { background: var(--mine); color: var(--mine-text); border-bottom-right-radius: 5px; }
  .bubble.them  { background: #fff; color: var(--ink); border:1px solid #ece6dc; border-bottom-left-radius: 5px; }
  .time { font-size: 10px; color: var(--muted); margin: 2px 6px 0; text-align: right; }
  .row.left .time { text-align: left; }
  .reaction {
    font-size: 20px; display: inline-block;
    background: #fff; border: 1px solid #ece6dc; border-radius: 999px;
    padding: 1px 6px; margin-top: -6px; position: relative; z-index: 1;
    animation: pop .18s ease;
  }
  .row.left .reaction { margin-left: 8px; }
  .row.right .reaction { margin-right: 8px; align-self: flex-end; }
  .bubble.ghost {
    background: transparent; border: 1px dashed var(--ghost-line); color: transparent;
    min-width: 54px; min-height: 38px; border-radius: 18px; border-bottom-left-radius: 5px;
  }
  .ghost-fade { animation: fade .9s ease forwards; }
  @keyframes fade {
    0%   { color: var(--ink); border-color: transparent; background:#fff; }
    100% { color: transparent; border-color: var(--ghost-line); background: transparent; }
  }
  .waiting { margin: auto; color: var(--muted); font-size: 13px; text-align:center; line-height:1.9; padding: 0 30px; }
  .empty { margin: auto; color: var(--muted); font-size: 13px; text-align:center; line-height:1.9; padding: 0 30px; }

  /* ---- composer ---- */
  .composer {
    flex: 0 0 auto; background: var(--bar); border-top: 1px solid #ece6dc;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
  }
  .composer.disabled { opacity: .5; pointer-events: none; }
  .stamps { display:flex; gap:6px; overflow-x:auto; padding: 2px 2px 8px; }
  .stamps button {
    flex: 0 0 auto; border:0; background:#f1ebe1; border-radius:999px;
    font-size:20px; width:42px; height:42px; line-height:1;
  }
  .stamps button:active { transform: scale(.9); }
  .inputrow { display:flex; gap:8px; align-items:flex-end; }
  textarea {
    flex:1; resize:none; border:1px solid #e3dccf; border-radius:20px;
    padding:10px 14px; font-size:16px; font-family:inherit; max-height:120px; line-height:1.4; background:#fbf9f5;
  }
  textarea:focus { outline:none; border-color: var(--accent); }
  .send { flex:0 0 auto; border:0; background: var(--mine); color:#fff; border-radius:50%; width:44px; height:44px; font-size:18px; }
  .send:disabled { opacity:.35; }

  .hidden { display: none !important; }
</style>
</head>
<body>
  <!-- ロビー：役割を選んで入室 -->
  <div id="lobby">
    <p>同じ「あいことば」を入れた二人がつながります。<br>まず二つのウインドウ（または端末）でこのページを開いてください。</p>
    <div class="room">
      <label for="roomInput" style="font-size:13px;color:var(--muted)">あいことば</label>
      <input id="roomInput" value="room1" autocomplete="off" />
    </div>
    <div class="roles">
      <button id="startBtn">会話をはじめる</button>
    </div>
  </div>

  <!-- チャット -->
  <header class="hidden" id="chatHeader">
    <div class="turn" id="turnLabel"></div>
    <button class="reset" id="resetBtn" title="退出してやり直す">↺</button>
  </header>

  <div class="thread hidden" id="thread"></div>

  <div class="composer hidden" id="composer">
    <div class="stamps" id="stamps"></div>
    <div class="inputrow">
      <textarea id="input" rows="1" placeholder="メッセージを入力…"></textarea>
      <button class="send" id="sendBtn" disabled>↑</button>
    </div>
  </div>

<script>
/* =========================================================
   通信の抽象化。いまは同一PC内の BroadcastChannel。
   将来 PeerJS(WebRTC) に差し替える場合は、同じ
   { send(obj), close() } インターフェイスを持つクラスを
   作って makeTransport() を切り替えるだけでよい。
   ========================================================= */
class BroadcastChannelTransport {
  constructor(room, onMessage) {
    this.ch = new BroadcastChannel("kieru-pair-" + room);
    this.ch.onmessage = (e) => onMessage(e.data);
  }
  send(obj) { this.ch.postMessage(obj); }
  close() { this.ch.close(); }
}
function makeTransport(room, onMessage) {
  return new BroadcastChannelTransport(room, onMessage);
  // 例: return new PeerJSTransport(room, onMessage);  ← ネット越し版で実装
}

/* =========================================================
   状態
   ========================================================= */
const STAMPS = ["👍","❤️","😂","🙏","😮","😢","✨","👀"];
let myId = null;      // このウインドウ固有のID（自他の区別・保存の分離に使う）
let room = "room1";
let transport = null;

let history = [];     // 自分の経験の記録（保存される）
                      //   { side:"me",   kind, content, time, id }
                      //   { side:"them", ghost:true, time, id } ← 相手の言葉は内容を捨てた残骸
let turn = "open";    // "open"=まだ誰も話していない（どちらからでも可） / "me" / "them"
let role = null;      // null / "starter"(先に話す人) / "responder"(あとに話す人)
let pending = null;   // 受信中の相手メッセージ（メモリのみ・保存しない）
                      //   { kind, content, time, id }
let fadeId = null;    // 直前に消した残骸をフェードさせる用

// 入力できる＝自分の番、または「まだ誰も話していない」とき
const canSend = () => (turn === "me" || turn === "open");
const storeKey = () => `kieru_pair_v2::${room}::${myId}`;

function save() {
  // 相手の言葉(pending/contentつき)は決して保存しない
  localStorage.setItem(storeKey(), JSON.stringify({ history, turn, role }));
}
function loadLocal() {
  try {
    const s = JSON.parse(localStorage.getItem(storeKey()));
    if (s && Array.isArray(s.history)) {
      history = s.history;
      turn = s.turn || "open";
      role = s.role || null;
    }
  } catch (e) {}
}
function now() {
  const d = new Date();
  return ("0"+d.getHours()).slice(-2) + ":" + ("0"+d.getMinutes()).slice(-2);
}

/* =========================================================
   入室
   ========================================================= */
const $ = (id) => document.getElementById(id);

$("startBtn").addEventListener("click", enter);

function enter() {
  // このウインドウ固有のID（同じタブのリロードでは維持、別タブでは別ID）
  myId = sessionStorage.getItem("kieru_wid");
  if (!myId) {
    myId = "w-" + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem("kieru_wid", myId);
  }
  room = ($("roomInput").value || "room1").trim();
  loadLocal();
  transport = makeTransport(room, onMessage);

  // ロビーを隠してチャットを表示
  $("lobby").classList.add("hidden");
  $("chatHeader").classList.remove("hidden");
  $("thread").classList.remove("hidden");
  $("composer").classList.remove("hidden");

  // 後から入った側が、相手の未返信メッセージを取りこぼさないよう挨拶
  transport.send({ type: "hello", from: myId });
  render();
}

/* =========================================================
   受信
   ========================================================= */
function onMessage(obj) {
  if (!obj || obj.from === myId) return;

  if (obj.type === "hello") {
    // 相手が今入ってきた。自分が返信待ち（turn==="them"）なら、
    // 直近の自分のメッセージを送り直して相手の画面に届ける。
    if (turn === "them") {
      const lastMine = [...history].reverse().find(e => e.side === "me");
      if (lastMine) {
        transport.send({ type:"msg", from: myId, kind: lastMine.kind,
                         content: lastMine.content, time: lastMine.time, id: lastMine.id });
      }
    }
    return;
  }

  if (obj.type === "msg") {
    if (pending && pending.id === obj.id) return;
    if (history.some(e => e.id === obj.id)) return;

    if (turn === "open" && role === null) role = "responder";

    pending = { kind: obj.kind, content: obj.content, time: obj.time, id: obj.id };
    turn = "me";
    save();
    render();
  }

  if (obj.type === "reaction") {
    // 相手が自分のメッセージにリアクションした → 自分の履歴にスタンプをくっつける
    const target = history.find(e => e.id === obj.targetId && e.side === "me");
    if (target) target.stamp = obj.stamp;
    turn = "me";
    save();
    render();
  }
}

/* =========================================================
   送信
   ========================================================= */
function sendMessage(content) {
  if (!canSend()) return;

  if (turn === "open" && role === null) role = "starter";

  // 返信した瞬間、いま見えている相手の言葉を「内容を捨てて」残骸にする
  if (pending) {
    fadeId = "fade-" + pending.id;
    history.push({ side: "them", ghost: true, time: pending.time, id: pending.id });
    pending = null;
  }

  const id = Date.now() + "-" + Math.random().toString(36).slice(2,6);
  const t = now();
  history.push({ side: "me", kind: "text", content, time: t, id });
  transport.send({ type: "msg", from: myId, kind: "text", content, time: t, id });

  turn = "them";
  save();
  render();
  fadeId = null;
}

function sendReaction(stamp) {
  if (!pending) return;        // リアクションは相手のメッセージがあるときだけ

  if (turn === "open" && role === null) role = "starter";

  // 相手のメッセージを残骸化し、リアクションをくっつける
  fadeId = "fade-" + pending.id;
  history.push({ side: "them", ghost: true, time: pending.time, id: pending.id, stamp });
  transport.send({ type: "reaction", from: myId, stamp, targetId: pending.id });
  pending = null;

  turn = "them";
  save();
  render();
  fadeId = null;
}

/* =========================================================
   描画
   ========================================================= */
const $thread = () => $("thread");

function render() {
  // header
  $("turnLabel").innerHTML = `<small>あいことば: ${room}</small>`;

  // composer 有効/無効
  const comp = $("composer");
  comp.classList.toggle("disabled", !canSend());
  $("input").placeholder = canSend() ? "メッセージを入力…" : "相手の番です…";

  // thread
  const th = $thread();
  th.innerHTML = "";

  if (history.length === 0 && !pending) {
    const e = document.createElement("div");
    e.className = "empty";
    e.textContent = canSend()
      ? "最初のひとことを送ってみてください。"
      : "相手が話しはじめるのを待っています…";
    th.appendChild(e);
    return;
  }

  for (const m of history) {
    th.appendChild(renderBubble(m));
  }
  if (pending) {
    th.appendChild(renderBubble({ side:"them", kind: pending.kind, content: pending.content, time: pending.time }));
  }

  // ターンの案内をスレッド末尾に表示
  const hint = document.createElement("div");
  hint.className = "waiting";
  if (turn === "me" || turn === "open") {
    hint.textContent = "なにか返事してみましょう";
  } else {
    hint.textContent = "相手の返信を待っています…";
  }
  th.appendChild(hint);

  th.scrollTop = th.scrollHeight;
}

function renderBubble(m) {
  const mine = m.side === "me";
  const row = document.createElement("div");
  row.className = "row " + (mine ? "right" : "left");
  const wrap = document.createElement("div");

  const b = document.createElement("div");
  let cls = "bubble " + (mine ? "mine" : "them");
  if (m.ghost) {
    cls += " ghost";
    if (fadeId && ("fade-" + m.id) === fadeId) cls += " ghost-fade";
  }
  b.className = cls;
  b.textContent = m.ghost ? "" : m.content;
  wrap.appendChild(b);

  if (m.stamp) {
    const r = document.createElement("div");
    r.className = "reaction";
    r.textContent = m.stamp;
    wrap.appendChild(r);
  }

  const t = document.createElement("div");
  t.className = "time";
  t.textContent = m.time;
  wrap.appendChild(t);

  row.appendChild(wrap);
  return row;
}

/* =========================================================
   入力まわり
   ========================================================= */
const $input = () => $("input");
const $send  = () => $("sendBtn");

document.addEventListener("input", (e) => {
  if (e.target.id !== "input") return;
  $send().disabled = e.target.value.trim() === "" || !canSend();
  e.target.style.height = "auto";
  e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px";
});

function submitText() {
  const v = $input().value.trim();
  if (!v || !canSend()) return;
  sendMessage(v);
  $input().value = ""; $input().style.height = "auto"; $send().disabled = true;
}
$("sendBtn").addEventListener("click", submitText);

// Mac: ⌘+Enter / Windows: Ctrl+Enter で送信
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); submitText(); }
});

// スタンプ
STAMPS.forEach(s => {
  const btn = document.createElement("button");
  btn.textContent = s;
  btn.addEventListener("click", () => sendReaction(s));
  $("stamps").appendChild(btn);
});

// 退出してやり直す
$("resetBtn").addEventListener("click", () => {
  if (!confirm("退出してやり直しますか？（あなたの履歴は消えます）")) return;
  localStorage.removeItem(storeKey());
  if (transport) transport.close();
  location.reload();
});
</script>
</body>
</html>
